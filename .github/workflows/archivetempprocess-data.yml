name: Process Monthly Closure Files

# Runs automatically whenever new files are pushed into raw/
on:
  push:
    paths:
      - 'raw/**.xlsb'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas pyxlsb

      - name: Convert any new Closure files in raw/
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/convert_closure.py --scan raw data

      - name: Send monthly closure summary email
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MTD_EMAIL_TO: ${{ secrets.MTD_EMAIL_TO }}
        run: python scripts/send_closure_email.py

      - name: Archive processed raw files
        run: |
          mkdir -p raw/processed
          # Move any .xlsb sitting directly in raw/ into raw/processed/
          # so the next run doesn't try to reprocess the same month.
          find raw -maxdepth 1 -name '*.xlsb' -exec mv {} raw/processed/ \;

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/
          git diff --cached --quiet || git commit -m "Archive processed monthly closure files [skip ci]"
          git push
