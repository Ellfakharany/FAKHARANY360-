name: Process Monthly Closure Files

# Runs automatically whenever new files are pushed into raw/
on:
  push:
    paths:
      - 'raw/**.xlsb'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas pyxlsb

      - name: Convert any new Closure files in raw/
        run: python scripts/convert_closure.py --scan raw data

      - name: Archive processed raw files
        run: |
          mkdir -p raw/processed
          # Move any .xlsb sitting directly in raw/ into raw/processed/
          # so the next run doesn't try to reprocess the same month.
          find raw -maxdepth 1 -name '*.xlsb' -exec mv {} raw/processed/ \;

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ raw/
          git diff --cached --quiet || git commit -m "Auto-process monthly closure data [skip ci]"

          # The remote can move between checkout and push if another run (or a
          # manual upload) landed in between — that's a normal race, not a real
          # error, so retry with a rebase instead of giving up after one push.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push rejected (attempt $i/5) — pulling latest changes and retrying..."
            git pull --rebase origin main
            sleep 2
          done

          echo "Failed to push after 5 attempts."
          exit 1
