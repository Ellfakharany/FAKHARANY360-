name: Backfill Historical Data to Supabase (one-time)

# Manual trigger only — run this once from the Actions tab after setting
# up Supabase, to migrate the existing data/*.json months over. Safe to
# re-run if needed (it just re-writes the same rows, no duplicates).
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas pyxlsb

      - name: Backfill data/*.json into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/backfill_supabase.py
